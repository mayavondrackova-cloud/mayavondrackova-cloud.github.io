<!DOCTYPE html>
<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Oblékání postavy - přesné vrstvy</title>
<style>
body {
  display: flex;
  justify-content: center;
  align-items: flex-start;
  margin-top: 30px;
  font-family: Arial, sans-serif;
}

.game-container {
  position: relative;
  width: 300px;
  height: 500px;
}

/* Postava */
.character {
  width: 100%;
  height: auto;
}

/* Oblečení - přesné vrstvy */
.clothing {
  position: absolute;
  pointer-events: none; 
  display: none; 
}

/* Specifické pozice pro každý kus */
#dress1 {
  top: 100px;  /* šaty přes trup */
  left: 0;
  width: 100%;
}

#pants {
  top: 300px; /* kalhoty přes nohy */
  left: 0;
  width: 100%;
}

#skirt {
  top: 250px; /* sukně přes boky */
  left: 0;
  width: 100%;
}

/* Ikonky oblečení vedle panenky */
.clothing-selector {
  margin-left: 30px;
  display: flex;
  flex-direction: column;
  gap: 15px;
}

.clothing-selector img {
  width: 80px;
  cursor: pointer;
  border: 2px solid transparent;
  transition: border 0.2s;
}

.clothing-selector img:hover {
  border: 2px solid #555;
}
</style>
</head>
<body>

<div class="game-container">
  <!-- Postava -->
  <img src="https://www.pngfind.com/pngs/m/81-818446_body-png-picture-female-body-vector-png-transparent.png" alt="Postava" class="character">

  <!-- Oblečení -->
  <img id="dress1" src="https://www.modablack.cz/user/categories/orig/saty.png" class="clothing">
  <img id="pants" src="https://media.istockphoto.com/id/1702691253/cs/vektor/vector-cartoon-red-zimn%C3%AD-turistick%C3%A9-kalhoty.jpg?s=612x612&w=0&k=20&c=WNDU8HrMCteQsJDpzHQ4HzqYcyYtNjCFkYu8G6dTID0=" class="clothing">
  <img id="skirt" src="https://cdn.creazilla.com/cliparts/78553/skirt-clipart-xl.png" class="clothing">
</div>

<div class="clothing-selector">
  <img src="https://www.modablack.cz/user/categories/orig/saty.png" alt="Šaty" onclick="wear('dress1')">
  <img src="https://media.istockphoto.com/id/1702691253/cs/vektor/vector-cartoon-red-zimn%C3%AD-turistick%C3%A9-kalhoty.jpg?s=612x612&w=0&k=20&c=WNDU8HrMCteQsJDpzHQ4HzqYcyYtNjCFkYu8G6dTID0=" alt="Kalhoty" onclick="wear('pants')">
  <img src="https://cdn.creazilla.com/cliparts/78553/skirt-clipart-xl.png" alt="Sukně" onclick="wear('skirt')">
</div>

<script>
function wear(itemId) {
  // Schovej všechny kusy
  document.querySelectorAll('.clothing').forEach(el => el.style.display = 'none');
  // Zobraz vybraný kus
  document.getElementById(itemId).style.display = 'block';
}
</script>

</body>
</html>
